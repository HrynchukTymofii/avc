services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    # Loopback-only: nginx (or an SSH tunnel) is the front door, never the raw port.
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/models:/app/models
      - ./backend/outputs:/app/outputs
      - ./backend/assets:/app/assets
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
